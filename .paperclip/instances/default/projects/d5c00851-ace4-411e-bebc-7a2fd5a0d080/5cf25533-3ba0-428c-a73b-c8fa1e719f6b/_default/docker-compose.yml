services:
  paperclip:
    image: ghcr.io/paperclipai/paperclip:latest
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    volumes:
      - .:/paperclip
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
